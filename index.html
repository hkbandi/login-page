<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm0 4a3 3 0 1 1 0 6 3 3 0 0 1 0-6zm0 14a8 8 0 0 1-6.193-2.94C7.22 15.42 9.497 14.5 12 14.5s4.78.92 6.193 2.56A8 8 0 0 1 12 20z"/>
        </svg>
      </div>

      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your account</p>

      <div id="error-message" class="error-message" role="alert" aria-live="polite"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
          <span class="field-error" id="email-error"></span>
        </div>

        <div class="form-group">
          <label for="password">
            Password
            <a href="#" class="forgot-link">Forgot password?</a>
          </label>
          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-password" aria-label="Show password">
              <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-off-icon hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="password-error"></span>
        </div>

        <div class="form-group checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" id="remember" name="remember" />
            <span class="checkmark"></span>
            Keep me signed in
          </label>
        </div>

        <button type="submit" class="btn-primary" id="submit-btn">
          <span class="btn-text">Sign in</span>
          <span class="btn-spinner hidden"></span>
        </button>
      </form>

      <p class="signup-text">
        Don't have an account? <a href="#">Create one</a>
      </p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
